<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talitha — Sales Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --green-900: #0d2e23;
  --green-800: #143e2f;
  --green-700: #1d4d3a;
  --green-600: #2a6249;
  --green-500: #3a7a5d;
  --green-400: #5a9678;
  --green-100: #d8e6dd;
  --green-50: #ecf2ee;
  --gold: #c89968;
  --gold-light: #e8c596;
  --gold-50: #f9f1e6;
  --paper: #faf8f3;
  --paper-warm: #f3ede0;
  --paper-card: #ffffff;
  --ink: #14201a;
  --ink-soft: #2d3a33;
  --ink-muted: #6b7a72;
  --ink-light: #9aa69e;
  --line: #dfd8c8;
  --line-soft: #ebe5d6;
  --red: #b8443c;
  --red-bg: #f5e0de;
  --green-pos: #2a6249;
  --green-pos-bg: #d8e6dd;
  --shadow-sm: 0 1px 2px rgba(20, 32, 26, 0.04);
  --shadow: 0 1px 3px rgba(20, 32, 26, 0.06), 0 4px 12px rgba(20, 32, 26, 0.04);
  --shadow-lg: 0 4px 12px rgba(20, 32, 26, 0.08), 0 16px 32px rgba(20, 32, 26, 0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Instrument Sans', -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ======== TOP NAV ======== */
.topnav {
  background: var(--green-900);
  color: var(--paper);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 24px;
  border-bottom: 1px solid var(--green-700);
}

.brand-mark {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-logo {
  width: 28px;
  height: 28px;
  background: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  color: var(--green-900);
  font-weight: 600;
  font-size: 16px;
}

.brand-text {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.01em;
}

.brand-divider { width: 1px; height: 22px; background: var(--green-600); }

.brand-sub {
  font-size: 12px;
  color: var(--green-100);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
}

.topnav-meta {
  margin-left: auto;
  display: flex;
  gap: 20px;
  align-items: center;
  font-size: 12px;
  color: var(--green-100);
}

.topnav-meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.topnav-meta-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--green-400);
  font-weight: 500;
}

.topnav-meta-value {
  font-size: 13px;
  color: var(--paper);
  font-weight: 500;
}

/* ======== TABS ======== */
.tabs-bar {
  background: var(--paper-card);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 50;
  padding: 0 24px;
  overflow-x: auto;
  scrollbar-width: thin;
}

.tabs {
  display: flex;
  gap: 0;
  min-width: max-content;
}

.tab {
  background: transparent;
  border: none;
  padding: 14px 20px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s ease;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tab:hover { color: var(--green-700); }

.tab.active {
  color: var(--green-700);
  border-bottom-color: var(--green-700);
  font-weight: 600;
}

.tab-num {
  font-size: 11px;
  color: var(--ink-light);
  font-weight: 500;
}

.tab.active .tab-num { color: var(--gold); }

/* ======== FILTER BAR ======== */
.filter-bar {
  background: var(--paper-warm);
  border-bottom: 1px solid var(--line);
  padding: 14px 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  align-items: center;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

.filter-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
}

.filter-pills {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.pill-btn {
  background: var(--paper-card);
  border: 1px solid var(--line);
  padding: 6px 12px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
  border-radius: 999px;
  transition: all 0.15s;
  white-space: nowrap;
}

.pill-btn:hover { border-color: var(--green-500); color: var(--green-700); }
.pill-btn.active { background: var(--green-700); color: var(--paper); border-color: var(--green-700); }

.filter-date-inputs {
  display: none;
  gap: 8px;
  align-items: center;
}

.filter-date-inputs.show { display: flex; }

.filter-date-inputs input {
  font-family: inherit;
  font-size: 12px;
  padding: 6px 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--paper-card);
  color: var(--ink);
}

.filter-date-inputs input:focus {
  outline: none;
  border-color: var(--green-500);
}

.week-range {
  font-size: 12px;
  color: var(--ink-muted);
  font-weight: 500;
  padding: 6px 12px;
  background: var(--paper-card);
  border-radius: 6px;
  border: 1px dashed var(--line);
}

/* ======== MAIN CONTENT ======== */
.main {
  padding: 32px 24px;
  max-width: 1440px;
  margin: 0 auto;
}

.panel { display: none; }
.panel.active { display: block; }

/* ======== TYPOGRAPHY ======== */
.page-eyebrow {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--green-600);
  font-weight: 600;
  margin-bottom: 6px;
}

.page-title {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 36px;
  line-height: 1.1;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 8px;
}

.page-title em { font-style: italic; color: var(--green-700); }

.page-lede {
  font-size: 15px;
  color: var(--ink-muted);
  max-width: 720px;
  margin-bottom: 28px;
}

.section-title {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 32px 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-title::before {
  content: "";
  display: inline-block;
  width: 4px;
  height: 18px;
  background: var(--gold);
  border-radius: 2px;
}

.subsection-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--green-700);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 20px 0 12px;
}

/* ======== KPI GRID (top of exec summary) ======== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}

.kpi {
  background: var(--paper-card);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}

.kpi-accent {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: var(--green-700);
}

.kpi-accent.gold { background: var(--gold); }
.kpi-accent.red { background: var(--red); }

.kpi-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  margin-bottom: 8px;
}

.kpi-value {
  font-family: 'Instrument Serif', serif;
  font-size: 32px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 6px;
}

.kpi-value.numeric {
  font-family: 'Instrument Sans', sans-serif;
  font-feature-settings: "tnum";
  font-weight: 600;
  font-size: 28px;
}

.kpi-sub {
  font-size: 12px;
  color: var(--ink-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.delta-pos { color: var(--green-pos); font-weight: 600; }
.delta-neg { color: var(--red); font-weight: 600; }
.delta-flat { color: var(--ink-muted); font-weight: 600; }

.delta-arrow { font-size: 11px; }

/* ======== CARDS / DATA TABLES ======== */
.card {
  background: var(--paper-card);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 20px 22px;
  margin-bottom: 18px;
}

.card-title {
  font-family: 'Instrument Serif', serif;
  font-size: 18px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 4px;
}

.card-sub {
  font-size: 12px;
  color: var(--ink-muted);
  margin-bottom: 16px;
}

.card-header-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
  gap: 16px;
  flex-wrap: wrap;
}

.card-header-row .card-title { margin-bottom: 4px; }
.card-header-row .card-sub { margin-bottom: 0; }

.card-header-meta {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  background: var(--gold-50);
  padding: 4px 10px;
  border-radius: 4px;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

@media (max-width: 900px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}

table.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

table.data-table th {
  text-align: left;
  padding: 10px 12px;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  border-bottom: 1px solid var(--line);
  background: var(--paper-warm);
}

table.data-table th.right { text-align: right; }

table.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line-soft);
  color: var(--ink-soft);
  vertical-align: middle;
}

table.data-table td.right {
  text-align: right;
  font-feature-settings: "tnum";
}

table.data-table td.mono {
  font-family: 'Instrument Sans';
  font-feature-settings: "tnum";
  font-weight: 500;
}

table.data-table tr:last-child td { border-bottom: none; }
table.data-table tr:hover { background: var(--paper-warm); }

.brand-tag {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 600;
  letter-spacing: 0.05em;
}

.brand-talitha { background: var(--green-50); color: var(--green-800); }
.brand-lofty { background: #e8eddc; color: #4a5a2a; }
.brand-westbean { background: #e0e8ee; color: #2a4a66; }
.brand-resale { background: #ede8df; color: #5a4a2a; }

.delta-cell {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-weight: 600;
  font-feature-settings: "tnum";
}

.delta-cell.pos { color: var(--green-pos); }
.delta-cell.neg { color: var(--red); }

/* ======== CHART CONTAINERS ======== */
.chart-wrap {
  position: relative;
  height: 280px;
  margin-top: 12px;
}

.chart-wrap.tall { height: 360px; }
.chart-wrap.short { height: 200px; }

/* ======== TREND LABEL ======== */
.trend-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 999px;
}

.trend-pill.increasing { background: var(--green-50); color: var(--green-700); }
.trend-pill.decreasing { background: var(--red-bg); color: var(--red); }
.trend-pill.flat { background: var(--paper-warm); color: var(--ink-muted); }

/* ======== EMPTY STATES ======== */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-muted);
  font-size: 13px;
  font-style: italic;
}

/* ======== STATUS DOTS ======== */
.status-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
}

.status-dot.green { background: var(--green-500); }
.status-dot.amber { background: var(--gold); }
.status-dot.red { background: var(--red); }

/* ======== RISK BANNER ======== */
.risk-banner {
  background: linear-gradient(to right, var(--red-bg), transparent);
  border-left: 3px solid var(--red);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  color: var(--ink);
  margin-bottom: 14px;
}

.risk-banner strong { color: var(--red); font-weight: 600; }

.note-banner {
  background: var(--gold-50);
  border-left: 3px solid var(--gold);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 14px;
}

/* ======== SCROLLABLE TABLE ======== */
.table-scroll {
  max-height: 460px;
  overflow-y: auto;
  border: 1px solid var(--line);
  border-radius: 6px;
}

.table-scroll table { margin: 0; }
.table-scroll thead th {
  position: sticky;
  top: 0;
  z-index: 1;
}

/* ======== UTILITY ======== */
.flex-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.flex-end { justify-content: flex-end; }
.text-right { text-align: right; }
.muted { color: var(--ink-muted); font-size: 12px; }
.tiny { font-size: 11px; color: var(--ink-light); }
.bold { font-weight: 600; }
.numeric { font-feature-settings: "tnum"; font-weight: 500; }

/* ======== SEARCH ======== */
.search-input {
  width: 100%;
  font-family: inherit;
  font-size: 13px;
  padding: 9px 14px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--paper-card);
  margin-bottom: 12px;
}

.search-input:focus {
  outline: none;
  border-color: var(--green-500);
  box-shadow: 0 0 0 3px rgba(58, 122, 93, 0.1);
}

/* ======== RESPONSIVE ======== */
@media (max-width: 768px) {
  .topnav { flex-wrap: wrap; gap: 14px; padding: 12px 16px; }
  .topnav-meta { width: 100%; gap: 16px; }
  .main { padding: 20px 16px; }
  .page-title { font-size: 28px; }
  .filter-bar { padding: 12px 16px; gap: 14px; }
}
</style>
</head>

// ============ FORMATTERS ============
const fmt = {
  money: (v, decimals=0) => {
    if (v === null || v === undefined) return '—';
    if (Math.abs(v) >= 1000000) return '$' + (v/1000000).toFixed(decimals === 0 ? 2 : decimals) + 'M';
    if (Math.abs(v) >= 1000) return '$' + (v/1000).toFixed(decimals) + 'K';
    return '$' + Math.round(v).toLocaleString();
  },
  moneyFull: (v) => v === null || v === undefined ? '—' : '$' + Math.round(v).toLocaleString(),
  pct: (v, decimals=1) => v === null || v === undefined ? '—' : (v >= 0 ? '+' : '') + v.toFixed(decimals) + '%',
  num: (v, decimals=0) => v === null || v === undefined ? '—' : Math.round(v * Math.pow(10, decimals)) / Math.pow(10, decimals),
  numFull: (v) => v === null || v === undefined ? '—' : Math.round(v).toLocaleString(),
  date: (s) => {
    if (!s) return '—';
    const d = new Date(s);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  },
  dateShort: (s) => {
    if (!s) return '—';
    const d = new Date(s);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  },
  trend: (curr, prev) => {
    if (prev === null || prev === undefined || prev === 0) return 'flat';
    const pct = (curr - prev) / Math.abs(prev) * 100;
    if (pct > 5) return 'increasing';
    if (pct < -5) return 'decreasing';
    return 'flat';
  },
  trendLabel: (t) => ({increasing:'↗ Increasing', decreasing:'↘ Decreasing', flat:'→ Flat'})[t] || '—',
};

// Set initial date inputs to last completed week
function setInitialDates() {
  const today = new Date(DATA.state.today);
  const daysFromMonday = (today.getDay() + 6) % 7;
  const lastSunday = new Date(today); lastSunday.setDate(today.getDate() - daysFromMonday - 1);
  const prevMonday = new Date(lastSunday); prevMonday.setDate(lastSunday.getDate() - 6);
  currentDateFrom = prevMonday.toISOString().slice(0,10);
  currentDateTo = lastSunday.toISOString().slice(0,10);
  document.getElementById('date-from').value = currentDateFrom;
  document.getElementById('date-to').value = currentDateTo;
}

// Apply preset period
function applyPeriod(period) {
  currentPeriod = period;
  const today = new Date(DATA.state.today);

  if (period === 'lastweek') {
    setInitialDates();
  } else if (period === '15d') {
    const from = new Date(today); from.setDate(today.getDate() - 14);
    currentDateFrom = from.toISOString().slice(0,10);
    currentDateTo = today.toISOString().slice(0,10);
  } else if (period === '30d') {
    const from = new Date(today); from.setDate(today.getDate() - 29);
    currentDateFrom = from.toISOString().slice(0,10);
    currentDateTo = today.toISOString().slice(0,10);
  } else if (period === '3mo') {
    const from = new Date(today); from.setMonth(today.getMonth() - 3);
    currentDateFrom = from.toISOString().slice(0,10);
    currentDateTo = today.toISOString().slice(0,10);
  } else if (period === '6mo') {
    const from = new Date(today); from.setMonth(today.getMonth() - 6);
    currentDateFrom = from.toISOString().slice(0,10);
    currentDateTo = today.toISOString().slice(0,10);
  } else if (period === '12mo') {
    const from = new Date(today); from.setMonth(today.getMonth() - 12);
    currentDateFrom = from.toISOString().slice(0,10);
    currentDateTo = today.toISOString().slice(0,10);
  } else if (period === 'custom') {
    // already set from inputs
    currentDateFrom = document.getElementById('date-from').value;
    currentDateTo = document.getElementById('date-to').value;
  }

  document.getElementById('date-inputs').classList.toggle('show', period === 'custom');
  document.querySelectorAll('#period-pills .pill-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.period === period);
  });
  updateMetaBar();
  if (period === 'custom') {
    document.getElementById('date-from').value = currentDateFrom;
    document.getElementById('date-to').value = currentDateTo;
  }
  renderCurrentPanel();
}

function updateMetaBar() {
  const periodLabel = {
    lastweek: 'Last completed week',
    '15d': 'Last 15 days',
    '30d': 'Last 30 days',
    '3mo': 'Last 3 months',
    '6mo': 'Last 6 months',
    '12mo': 'Last 12 months',
    custom: 'Custom range',
  }[currentPeriod];
  const range = `${fmt.dateShort(currentDateFrom)} – ${fmt.dateShort(currentDateTo)}`;
  document.getElementById('meta-period').textContent = `${periodLabel} (${range})`;
  document.getElementById('week-range').textContent = range;
  document.getElementById('meta-data').textContent = fmt.dateShort(DATA.meta.data_through);
}

// Filter daily series to current period
function getFilteredDaily() {
  const from = currentDateFrom;
  const to = currentDateTo;
  return DATA.daily.filter(d => d.date >= from && d.date <= to);
}

function getFilteredDailyByBrand(brand) {
  return DATA.daily_by_brand[brand].filter(d => d.date >= currentDateFrom && d.date <= currentDateTo);
}

function getFilteredDailyByCategory(cat) {
  if (!DATA.daily_by_category[cat]) return [];
  return DATA.daily_by_category[cat].filter(d => d.date >= currentDateFrom && d.date <= currentDateTo);
}

// Sum revenue from daily series
function sumDaily(arr) {
  return arr.reduce((s, d) => s + d.rev, 0);
}

// ============ PANEL: MONTHLY PERFORMANCE ============
function renderMonthly() {
  const monthly = DATA.monthly;
  const last12mo = monthly.slice(-12);

  const today = new Date(DATA.state.today);
  const dayOfMonth = today.getDate();
  const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  const monthElapsedPct = (dayOfMonth / daysInMonth) * 100;

  const thisMonthIdx = monthly.length - 1;
  const thisMonth = monthly[thisMonthIdx];
  const lastMonth = monthly[thisMonthIdx - 1];
  const sameMonthLastYear = monthly[thisMonthIdx - 12];

  const momPct = lastMonth ? (thisMonth.revenue - lastMonth.revenue) / lastMonth.revenue * 100 : null;
  const momDelta = lastMonth ? thisMonth.revenue - lastMonth.revenue : null;

  const yoyPct = sameMonthLastYear ? (thisMonth.revenue - sameMonthLastYear.revenue) / sameMonthLastYear.revenue * 100 : null;

  const rolling3 = monthly.slice(-3).reduce((s,m) => s + m.revenue, 0) / 3;

  // Project month-end based on % elapsed
  const projected = thisMonth.revenue / (monthElapsedPct/100);
  // Annual run rate: last 12 months
  const annualRunRate = last12mo.reduce((s,m) => s + m.revenue, 0);

  const trend = fmt.trend(rolling3, monthly.slice(-6,-3).reduce((s,m) => s + m.revenue, 0)/3);

  const html = `
    <div class="page-eyebrow">Page 03</div>
    <h1 class="page-title"><em>Monthly</em> performance</h1>

        <div class="kpi-label">MTD revenue</div>

        <div class="kpi-sub">${momDelta ? (momDelta >= 0 ? '+' : '') + fmt.money(momDelta,1) : '—'} vs last month</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent gold"></div>
        <div class="kpi-label">Projected month-end</div>
        <div class="kpi-value numeric">${fmt.money(projected, 1)}</div>
        <div class="kpi-sub">Linear extrapolation</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent gold"></div>
        <div class="kpi-label">Annual run rate</div>
        <div class="kpi-value numeric">${fmt.money(annualRunRate, 1)}</div>
        <div class="kpi-sub">Trailing 12 months</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent ${yoyPct >= 0 ? '' : 'red'}"></div>
        <div class="kpi-label">Year-over-Year</div>
        <div class="kpi-value numeric">${yoyPct !== null ? `<span class="${yoyPct >= 0 ? 'delta-pos' : 'delta-neg'}">${fmt.pct(yoyPct)}</span>` : '—'}</div>
        <div class="kpi-sub">vs same month last year</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent"></div>
        <div class="kpi-label">3-month rolling avg</div>
        <div class="kpi-value numeric">${fmt.money(rolling3, 1)}</div>
        <div class="kpi-sub"><span class="trend-pill ${trend}">${fmt.trendLabel(trend)}</span></div>
      </div>

    <div class="card">

            <th class="right">Margin</th>
            <th class="right">Margin %</th>
            <th class="right">Orders</th>
            <th class="right">Customers</th>
            <th class="right">YoY %</th>
          </tr>
        </thead>
        <tbody>
          ${last12mo.slice().reverse().map((m, idx) => {
            const reverseIdx = monthly.length - 1 - idx;
            const ly = monthly[reverseIdx - 12];
            const yoy = ly ? (m.revenue - ly.revenue)/ly.revenue * 100 : null;
            return `
              <tr>
                <td><span class="bold">${m.ym}</span></td>
                <td class="right mono">${fmt.moneyFull(m.revenue)}</td>

          ...CHART_DEFAULTS.plugins.tooltip,
          callbacks: { label: ctx => `${ctx.dataset.label}: ${fmt.moneyFull(ctx.parsed.y)}` }
        }
      }
    }
  });
}



// ============ PANEL: BRAND PERFORMANCE ============
function renderBrands() {
  const brands = ['Talitha','Lofty','WestBean'];
  const today = new Date(DATA.state.today);
  const last7DateStr = new Date(today.getTime() - 7*24*60*60*1000).toISOString().slice(0,10);
  const last14DateStr = new Date(today.getTime() - 14*24*60*60*1000).toISOString().slice(0,10);
  const last30DateStr = new Date(today.getTime() - 30*24*60*60*1000).toISOString().slice(0,10);
  const last60DateStr = new Date(today.getTime() - 60*24*60*60*1000).toISOString().slice(0,10);
  const last90DateStr = new Date(today.getTime() - 90*24*60*60*1000).toISOString().slice(0,10);
  const last180DateStr = new Date(today.getTime() - 180*24*60*60*1000).toISOString().slice(0,10);
  const last365DateStr = new Date(today.getTime() - 365*24*60*60*1000).toISOString().slice(0,10);

  // Compute per-brand metrics
  const brandMetrics = brands.map(brand => {
    const daily = DATA.daily_by_brand[brand] || [];
    const wtd = daily.filter(d => d.date >= last7DateStr).reduce((s,d) => s + d.rev, 0);
    const prevWeek = daily.filter(d => d.date >= last14DateStr && d.date < last7DateStr).reduce((s,d) => s + d.rev, 0);
    const mtd = daily.filter(d => d.date >= last30DateStr).reduce((s,d) => s + d.rev, 0);
    const lastMonth = daily.filter(d => d.date >= last60DateStr && d.date < last30DateStr).reduce((s,d) => s + d.rev, 0);
    const t90 = daily.filter(d => d.date >= last90DateStr).reduce((s,d) => s + d.rev, 0);
    const t12mo = daily.filter(d => d.date >= last365DateStr).reduce((s,d) => s + d.rev, 0);

    // Rolling 3-month avg = avg of last 3 months
    const rolling3mo = (DATA.monthly_by_brand[brand]||[]).slice(-3).reduce((s,m) => s + m.revenue, 0) / 3;

    return {
      brand,
      wtd, prevWeek,
      mtd, lastMonth,
      t90, t12mo,
      rolling3mo,
      momPct: lastMonth > 0 ? (mtd - lastMonth) / lastMonth * 100 : null,
      wowPct: prevWeek > 0 ? (wtd - prevWeek) / prevWeek * 100 : null,
    };
  });

  const totalT12mo = brandMetrics.reduce((s,b) => s + b.t12mo, 0);

  let html = `
    <div class="page-eyebrow">Page 04</div>
    <h1 class="page-title"><em>Brand</em> performance</h1>
    <p class="page-lede">Talitha, Lofty, and WestBean — broken out by week, month, and trailing periods. All wholesale, products only.</p>
  `;

  // Brand cards
  html += `<div class="grid-3">`;
  brands.forEach(brand => {
    const m = brandMetrics.find(x => x.brand === brand);
    const trend = fmt.trend(m.rolling3mo, m.lastMonth);
    html += `
      <div class="card">
        <div class="card-header-row">
          <div>
            <div class="card-title">${brand}</div>
            <div class="card-sub">${(m.t12mo/totalT12mo*100).toFixed(1)}% of total brand revenue</div>
          </div>
          <span class="brand-tag brand-${brand.toLowerCase()}">${brand}</span>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
          <div>

            <div style="font-size:20px;font-weight:600;">${fmt.money(m.mtd,1)}</div>
            <div style="font-size:11px;" class="${m.momPct >= 0 ? 'delta-pos' : 'delta-neg'}">${fmt.pct(m.momPct)} MoM</div>
          </div>
          <div>
            <div class="kpi-label">Last week</div>
            <div style="font-size:20px;font-weight:600;">${fmt.money(m.wtd,1)}</div>
            <div style="font-size:11px;" class="${m.wowPct >= 0 ? 'delta-pos' : 'delta-neg'}">${fmt.pct(m.wowPct)} WoW</div>
          </div>
          <div>
            <div class="kpi-label">Trailing 90d</div>
            <div style="font-size:18px;font-weight:600;">${fmt.money(m.t90,1)}</div>
          </div>
          <div>
            <div class="kpi-label">Trailing 12mo</div>
            <div style="font-size:18px;font-weight:600;">${fmt.money(m.t12mo,2)}</div>
          </div>
        </div>

        <div style="margin-bottom:8px;">
          <span class="trend-pill ${trend}">${fmt.trendLabel(trend)}</span>
          <span class="muted" style="margin-left:8px;font-size:11px;">3-mo avg ${fmt.money(m.rolling3mo,1)}</span>
        </div>

        <div class="chart-wrap short" style="margin-top:8px;"><canvas id="brand-chart-${brand.toLowerCase()}"></canvas></div>

      <div class="card-title">Brand revenue comparison</div>
      <div class="card-sub">Trailing 12 months · monthly revenue per brand</div>

        <thead>
          <tr>
            <th>Brand</th>
            <th class="right">WTD</th>
            <th class="right">WoW %</th>
            <th class="right">MTD</th>
            <th class="right">MoM %</th>
            <th class="right">Trailing 90d</th>
            <th class="right">Trailing 12mo</th>
            <th class="right">3mo avg</th>
            <th>Trend</th>
          </tr>
        </thead>
        <tbody>
          ${brandMetrics.map(m => {
            const trend = fmt.trend(m.rolling3mo, m.lastMonth);
            return `
              <tr>
                <td><span class="brand-tag brand-${m.brand.toLowerCase()}">${m.brand}</span></td>
                <td class="right mono">${fmt.moneyFull(m.wtd)}</td>
                <td class="right"><span class="delta-cell ${m.wowPct >= 0 ? 'pos':'neg'}">${fmt.pct(m.wowPct)}</span></td>

              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById('panel-brands').innerHTML = html;

  // Per-brand mini sparkline charts (last 12 weeks)
  brands.forEach(brand => {

    const last12w = (DATA.weekly_by_brand[brand]||[]).slice(-12);

        labels: last12w.map(w => fmt.dateShort(w.week_start)),

  const topMargin = DATA.top_margin_skus;
  const bottomMargin = DATA.bottom_margin_skus;

  const totalRev = byBrand.reduce((s,b) => s + b.revenue, 0);
  const totalCogs = byBrand.reduce((s,b) => s + b.cogs, 0);

  const ctx = document.getElementById('margins-brand-chart').getContext('2d');

// ============ PANEL: RISK ANALYSIS ============

  const skusRiskWow = e.top_10_skus_risk_wow;
  const skusRiskYoy = e.top_10_skus_risk_yoy;

  const yoySet = new Set(yoyRisk.map(r => r.customer));
  const compoundAccts = wowRisk.filter(r => yoySet.has(r.customer));

  const wowSkuSet = new Set(skusRiskWow.map(s => s.sku));
  const yoySkuSet = new Set(skusRiskYoy.map(s => s.sku));

    ${(compoundAccts.length > 0 || compoundSkus.length > 0) ? `
      <div class="risk-banner">
        <strong>⚠ Compound risk:</strong> ${compoundAccts.length} account(s) and ${compoundSkus.length} SKU(s) are declining on BOTH timescales — these need immediate attention.
      </div>
    ` : `

        ✓ No compound risks detected this week. All risk signals are isolated to a single timescale.
      </div>
    `}

      <div class="card-header-row">
        <div>
          <div class="card-title">⚠ Compound risk accounts</div>

        </div>

      </div>

        <thead><tr><th>Customer</th><th class="right">Last wk</th><th class="right">Prior wk</th><th class="right">WoW %</th></tr></thead>
        <tbody>
          ${compoundAccts.map(r => `
            <tr style="background: rgba(184,68,60,0.04);">
              <td><span class="bold">${r.customer}</span></td>
              <td class="right mono">${fmt.moneyFull(r.this_rev)}</td>
              <td class="right mono">${fmt.moneyFull(r.prev_rev)}</td>
              <td class="right"><span class="delta-cell neg">${fmt.pct(r.pct_change)}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}

    ${compoundSkus.length > 0 ? `
    <div class="card">
      <div class="card-header-row">
        <div>
          <div class="card-title">⚠ Compound risk SKUs</div>
          <div class="card-sub">Declining both week-over-week AND year-over-year</div>
        </div>
        <span class="card-header-meta" style="background: var(--red-bg); color: var(--red);">High Priority</span>
      </div>
      <table class="data-table">
        <thead><tr><th>SKU</th><th>Brand</th><th class="right">Last wk</th><th class="right">WoW %</th></tr></thead>
        <tbody>
          ${compoundSkus.map(s => `
            <tr style="background: rgba(184,68,60,0.04);">
              <td>
                <div class="bold" style="font-size:12px;">${s.sku}</div>
                <div class="tiny">${s.description}</div>

              <td><span class="brand-tag brand-${(s.brand||'resale').toLowerCase()}">${s.brand}</span></td>
              <td class="right mono">${fmt.moneyFull(s.curr_rev)}</td>
              <td class="right"><span class="delta-cell neg">${fmt.pct(s.pct_change)}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}

    <h2 class="subsection-title">Week-over-Week declines</h2>

      <div class="card">
        <div class="card-title">Accounts at risk · WoW</div>

        <table class="data-table">
          <thead><tr><th>Customer</th><th class="right">Last wk</th><th class="right">% Δ</th></tr></thead>
          <tbody>
            ${wowRisk.map(r => `
              <tr ${yoySet.has(r.customer) ? 'style="background: rgba(184,68,60,0.04);"' : ''}>

                  <span class="bold">${r.customer}</span>

          <tbody>
            ${yoyRisk.map(r => `
              <tr ${wowSet.has(r.customer) ? 'style="background: rgba(184,68,60,0.04);"' : ''}>
                <td>
                  <span class="bold">${r.customer}</span>
                  ${wowSet.has(r.customer) ? '<span class="tiny" style="color: var(--red);"> · also WoW</span>' : ''}

          <thead><tr><th>SKU</th><th class="right">Last wk</th><th class="right">Same wk LY</th><th class="right">% Δ</th></tr></thead>
          <tbody>
            ${skusRiskYoy.map(s => `
              <tr ${wowSkuSet.has(s.sku) ? 'style="background: rgba(184,68,60,0.04);"' : ''}>
                <td>
                  <div class="bold" style="font-size:12px;">${s.sku} ${wowSkuSet.has(s.sku) ? '<span class="tiny" style="color: var(--red);">· also WoW</span>' : ''}</div>
                  <div class="tiny">${s.description}</div>
                </td>
                <td class="right mono">${fmt.moneyFull(s.curr_rev)}</td>
                <td class="right mono">${fmt.moneyFull(s.prev_rev)}</td>
                <td class="right"><span class="delta-cell neg">${fmt.pct(s.pct_change)}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    </div>
  `;

  document.getElementById('panel-risk').innerHTML = html;
}

// ============ ROUTING ============
function ensurePanelExists(name) {
  let el = document.getElementById('panel-' + name);
  if (!el) {
    el = document.createElement('div');
    el.id = 'panel-' + name;
    el.className = 'panel' + (name === currentTab ? ' active' : '');
    document.getElementById('main').appendChild(el);
  }
  return el;
}

function renderCurrentPanel() {
  ensurePanelExists(currentTab);
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  ensurePanelExists(currentTab).classList.add('active');

  if (currentTab === 'exec') renderExec();
  else if (currentTab === 'weekly') renderWeekly();
  else if (currentTab === 'monthly') renderMonthly();
  else if (currentTab === 'brands') renderBrands();
  else if (currentTab === 'newaccts') renderNewAccounts();
  else if (currentTab === 'health') renderHealth();
  else if (currentTab === 'products') renderProducts();
  else if (currentTab === 'margins') renderMargins();
  else if (currentTab === 'risk') renderRisk();
}

// ============ INIT ============
function init() {
  // Build panel containers
  ['exec','weekly','monthly','brands','newaccts','health','products','margins','risk'].forEach(name => {
    const el = document.createElement('div');
    el.id = 'panel-' + name;
    el.className = 'panel' + (name === 'exec' ? ' active' : '');
    document.getElementById('main').appendChild(el);
  });

  // Tab switching
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentTab = t.dataset.target;
      renderCurrentPanel();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  // Period pills
  document.querySelectorAll('#period-pills .pill-btn').forEach(b => {
    b.addEventListener('click', () => applyPeriod(b.dataset.period));
  });

  // Custom date inputs
  document.getElementById('date-from').addEventListener('change', (e) => {
    if (currentPeriod === 'custom') {
      currentDateFrom = e.target.value;
      updateMetaBar();
      renderCurrentPanel();
    }
  });
  document.getElementById('date-to').addEventListener('change', (e) => {
    if (currentPeriod === 'custom') {
      currentDateTo = e.target.value;
      updateMetaBar();
      renderCurrentPanel();
    }
  });

  setInitialDates();
  applyPeriod('lastweek');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
